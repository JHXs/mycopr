name: zotero
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - zotero/**

jobs:
  copr:
    name: copr
    runs-on: ubuntu-latest
    env:
      SPEC_FILE: 'zotero/zotero.spec'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version number
        id: extracted_version
        run: |
          VERSION=$(curl -s "https://aur.archlinux.org/cgit/aur.git/plain/PKGBUILD?h=zotero" | grep '^pkgver=' | cut -d= -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Update .spec file
        run: |
          CURRENT_VERSION=$(awk '/^%global[[:space:]]+package_version/ {print $3}' "$SPEC_FILE")
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            sed -i "s/^%global[[:space:]]\+package_version.*/%global package_version $VERSION/" "$SPEC_FILE"
            echo "updated=true" >> $GITHUB_ENV
          else
            echo "updated=false" >> $GITHUB_ENV
          fi

      - name: Commit and push changes
        if: env.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update version"
          commit_user_name: "GitHub Action"
          file_pattern: "zotero/zotero.spec"

      - name: Setup copr-cli
        if: env.updated == 'true'
        run: |
          pip3 install -I copr-cli==1.105

      - name: Login
        if: env.updated == 'true'
        run: |
          copr-cli --config <(echo "${COPR_CLI_CONFIG}") whoami
        env:
          COPR_CLI_CONFIG: ${{secrets.COPR_CLI_CONFIG}}

      - name: Build
        id: build
        if: env.updated == 'true'
        run: |
          copr-cli --config <(echo "${COPR_CLI_CONFIG}") buildscm --clone-url "https://github.com/${{github.repository}}" --commit "${{github.sha}}" --subdir "${BUILD_DIR}" --spec "${BUILD_PACKAGE}.spec" --type git --method rpkg "${BUILD_REPO}" | sed -n 's/^Created builds: /build_id=/p' | tr -d ',' >> "${GITHUB_OUTPUT}"
        env:
          COPR_CLI_CONFIG: ${{secrets.COPR_CLI_CONFIG}}
          BUILD_REPO: ikunji/zotero
          BUILD_DIR: zotero
          BUILD_PACKAGE: zotero
