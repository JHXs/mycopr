name: Unified Copr Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if no update'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_updates: ${{ steps.set-matrix.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - id: set-matrix
        run: |
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force_build }}" == "true" ]; then
            FORCE_ARG="--force"
          fi

          # 获取需要更新的包及其数据
          PACKAGES=$(uv run scripts/check_upstream.py $FORCE_ARG)
          echo "matrix=$PACKAGES" >> $GITHUB_OUTPUT

          if [ "$PACKAGES" == "[]" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No updates found."
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Found updates for the following packages:"
            echo "$PACKAGES" | jq -r '.[] | .name'
          fi
  update-and-build:
    needs: setup-matrix
    if: needs.setup-matrix.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Update Spec File
        id: updater
        run: |
          # 提取数据并序列化为 JSON 字符串
          DATA_JSON='${{ toJson(matrix.package.data) }}'
          uv run scripts/update_spec.py --pkg ${{ matrix.package.name }} --upstream-data "$DATA_JSON" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.updater.outputs.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update ${{ matrix.package.name }} to ${{ steps.updater.outputs.version }}"
          file_pattern: "${{ steps.updater.outputs.spec_file }}"

      - name: Trigger Copr Build
        if: steps.updater.outputs.updated == 'true' || github.event.inputs.force_build == 'true'
        env:
          COPR_CLI_CONFIG: ${{ secrets.COPR_CLI_CONFIG }}
          REPOS: ${{ steps.updater.outputs.copr_repos }}
          SPEC_FILE: ${{ steps.updater.outputs.spec_file }}
        run: |
          # 获取 commit SHA
          NEW_SHA=$(git rev-parse HEAD)

          IFS=',' read -ra ADDR <<< "$REPOS"
          for REPO in "${ADDR[@]}"; do
            echo "🚀 Building ${{ matrix.package.name }} in $REPO..."
            SUBDIR=$(dirname "$SPEC_FILE")
            SPEC_NAME=$(basename "$SPEC_FILE")

            uv run copr-cli --config <(echo "${COPR_CLI_CONFIG}") buildscm \
              --clone-url "https://github.com/${{ github.repository }}" \
              --commit "${NEW_SHA}" \
              --subdir "${SUBDIR}" \
              --spec "${SPEC_NAME}" \
              --type git \
              --method rpkg \
              "${REPO}"
          done
