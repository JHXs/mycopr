name: refram Update
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - reframe/**

jobs:
  update-spec:
    name: Update spec file
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.set_output.outputs.updated }}
      new_sha: ${{ steps.get_sha.outputs.new_sha }}
    env:
      SPEC_FILE: 'reframe/reframe.spec'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract version number
        id: extracted_version
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/AlynxZhou/reframe/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+' | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Update .spec file
        run: |
          CURRENT_VERSION=$(awk '/^%global[[:space:]]+package_version/ {print $3}' "$SPEC_FILE")
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            sed -i "s/^%global[[:space:]]\+package_version.*/%global package_version $VERSION/" "$SPEC_FILE"
            echo "updated=true" >> $GITHUB_ENV
          else
            echo "updated=false" >> $GITHUB_ENV
          fi

      - name: Commit and push changes
        if: env.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update version"
          commit_user_name: "GitHub Action"
          file_pattern: "reframe/reframe.spec"

      - name: Get the new commit SHA
        id: get_sha
        run: echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set output
        id: set_output
        run: |
          echo "updated=${{ env.updated }}" >> "$GITHUB_OUTPUT"

  build-matrix:
    name: Build for ${{ matrix.repo }}
    needs: update-spec
    if: needs.update-spec.outputs.updated == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [ikunji/mycopr, ikunji/reframe]
    env:
      BUILD_DIR: reframe
      BUILD_PACKAGE: reframe
    steps:
      - name: Checkout repository at the updated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-spec.outputs.new_sha }}

      - name: Setup copr-cli
        run: |
          pip3 install -I copr-cli==1.105

      - name: Login
        run: |
          copr-cli --config <(echo "${COPR_CLI_CONFIG}") whoami
        env:
          COPR_CLI_CONFIG: ${{ secrets.COPR_CLI_CONFIG }}

      - name: Build
        id: build
        run: |
          NEW_SHA="${{ needs.update-spec.outputs.new_sha }}"
          if [ -z "$NEW_SHA" ]; then
            NEW_SHA="${{ github.sha }}"
          fi
          copr-cli --config <(echo "${COPR_CLI_CONFIG}") buildscm \
            --clone-url "https://github.com/${{ github.repository }}" \
            --commit "$NEW_SHA" \
            --subdir "${BUILD_DIR}" \
            --spec "${BUILD_PACKAGE}.spec" \
            --type git --method rpkg "${{ matrix.repo }}" \
            | sed -n 's/^Created builds: /build_id=/p' | tr -d ',' >> "${GITHUB_OUTPUT}"
        env:
          COPR_CLI_CONFIG: ${{ secrets.COPR_CLI_CONFIG }}
