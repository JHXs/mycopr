name: maple-mono-nf-cn Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-geproton-version:
    runs-on: ubuntu-latest
    env:
      SPEC_FILE: 'ge-proton/ge-proton.spec'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt update && sudo apt install -y wget curl

#       - name: Download packages info from repository
#         run: |
#           wget -O Packages.gz https://deb.termius.com/dists/squeeze/main/binary-amd64/Packages.gz
#           gzip -d Packages.gz

      - name: Extract version number
        id: extracted_version
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/GloriousEggroll/proton-ge-custom/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+' | sed 's/^v//' | sed -E 's/^v?GE-Proton//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Update .spec file
        run: |
          CURRENT_VERSION=$(awk '/^%global[[:space:]]+package_version/ {print $3}' "$SPEC_FILE")
          echo "Current version in .spec file: $CURRENT_VERSION"
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            sed -i "s/^%global[[:space:]]\+package_version.*/%global package_version $VERSION/" "$SPEC_FILE"
            echo "updated=true" >> $GITHUB_ENV
          else
            echo "updated=false" >> $GITHUB_ENV
          fi

      - name: Commit and push changes
        if: env.updated == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update version"
          commit_user_name: "GitHub Action"
          file_pattern: "ge-proton/ge-proton.spec"

      - name: Get the new commit SHA
        id: get_sha
        run: echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup copr-cli
        if: env.updated == 'true'
        run: |
          pip3 install -I copr-cli==1.105

      - name: Login
        if: env.updated == 'true'
        run: |
          copr-cli --config <(echo "${COPR_CLI_CONFIG}") whoami
        env:
          COPR_CLI_CONFIG: ${{secrets.COPR_CLI_CONFIG}}

      - name: Build
        id: build
        if: env.updated == 'true'
        run: |
          # 从 push 步骤的输出中拿到新 commit SHA
          NEW_SHA="${{ steps.get_sha.outputs.new_sha }}"
          # 如果 push 步骤没有产生新提交（比如没有变更），则回退到 github.sha
          if [ -z "$NEW_SHA" ]; then
            NEW_SHA="${{ github.sha }}"
          fi
          copr-cli --config <(echo "${COPR_CLI_CONFIG}") buildscm --clone-url "https://github.com/${{github.repository}}" --commit "$NEW_SHA" --subdir "${BUILD_DIR}" --spec "${BUILD_PACKAGE}.spec" --type git --method rpkg "${BUILD_REPO}" | sed -n 's/^Created builds: /build_id=/p' | tr -d ',' >> "${GITHUB_OUTPUT}"
        env:
          COPR_CLI_CONFIG: ${{secrets.COPR_CLI_CONFIG}}
          BUILD_REPO: ikunji/mycopr
          BUILD_DIR: ge-proton
          BUILD_PACKAGE: ge-proton

